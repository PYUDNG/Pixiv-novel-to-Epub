name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 添加权限配置
    permissions:
      contents: write  # 允许创建release和上传文件

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 获取所有历史记录以便生成版本号
        submodules: recursive # 自动拉取子模块
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    # jEpub采用非npm版本，需要手动构建产物
    - name: Build Submodule Dependency
      run: |
        cd deps/jEpub
        npm ci          # 安装子模块自身所需的开发依赖（如 vite, typescript 等）
        npm run build   # 编译出 dist 产物
    
    # 继续安装常规依赖
    - name: Install dependencies
      run: npm ci       # 此时子模块已有 dist，主项目可以完美链接并识别
    
    - name: Build project
      run: npm run build
    
    - name: Get version from package.json
      id: get_version
      run: |
        VERSION=$(node -p "require('./package.json').version")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
    
    - name: Generate build number
      id: build_number
      run: |
        # 使用当前时间戳作为构建号
        BUILD_NUMBER=$(date +%Y%m%d%H%M%S)
        echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
        echo "Build number: $BUILD_NUMBER"
    
    - name: List build artifacts
      run: ls -la dist/
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: dist/
        retention-days: 7
    
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      with:
        name: Release v${{ steps.get_version.outputs.version }} (Build ${{ steps.build_number.outputs.build_number }})
        tag_name: ${{ github.ref_name }}
        body: |
          ## 构建信息
          - **版本**: v${{ steps.get_version.outputs.version }}
          - **构建号**: ${{ steps.build_number.outputs.build_number }}
          - **构建时间**: ${{ steps.build_number.outputs.build_number }}
          - **触发事件**: ${{ github.event_name }}
          
          ## 构建产物说明
          1. `pixiv-novel-to-epub.user.js` - 未经修改的原始构建版本，**不支持自动更新**
          2. `pixiv-novel-to-epub.greasyfork.user.js` - Greasyfork版本，包含代码格式化及源代码说明，**不支持自动更新**
          3. `pixiv-novel-to-epub.min.user.js` - 压缩版本，文件体积小，安装/更新快，**支持自动更新，适合大多数用户**
          4. `pixiv-novel-to-epub.meta.js` - 检查更新用文件，**此文件不支持安装**
          
          ## 安装说明
          1. 以上构建产物中，除`.meta.js`外均可安装使用，且功能没有任何差别
          2. 可直接点击链接，安装到Tampermonkey、Violentmonkey或ScriptCat等用户脚本管理器
          3. 访问Pixiv网站即可使用
          
          ## 变更日志
          请查看提交历史或GitHub Releases页面获取详细变更信息。
        draft: false
        prerelease: false
        files: |
          dist/pixiv-novel-to-epub.user.js
          dist/pixiv-novel-to-epub.greasyfork.user.js
          dist/pixiv-novel-to-epub.min.user.js
          dist/pixiv-novel-to-epub.meta.js
    
    - name: Create Manual Release
      id: create_manual_release
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'workflow_dispatch'
      with:
        name: Manual Build v${{ steps.get_version.outputs.version }} (Build ${{ steps.build_number.outputs.build_number }})
        tag_name: manual-${{ steps.build_number.outputs.build_number }}
        body: |
          ## 手动构建信息
          - **版本**: v${{ steps.get_version.outputs.version }}
          - **构建号**: ${{ steps.build_number.outputs.build_number }}
          - **构建时间**: ${{ steps.build_number.outputs.build_number }}
          - **触发方式**: 手动触发
          
          ## 构建产物说明
          1. `pixiv-novel-to-epub.user.js` - 未经修改的原始构建版本，**不支持自动更新**
          2. `pixiv-novel-to-epub.greasyfork.user.js` - Greasyfork版本，包含代码格式化及源代码说明，**不支持自动更新**
          3. `pixiv-novel-to-epub.min.user.js` - 压缩版本，文件体积小，安装/更新快，**支持自动更新，适合大多数用户**
          4. `pixiv-novel-to-epub.meta.js` - 检查更新用文件，**此文件不支持安装**
          
          ## 安装说明
          1. 以上构建产物中，除`.meta.js`外均可安装使用，且功能没有任何差别
          2. 可直接点击链接，安装到Tampermonkey、Violentmonkey或ScriptCat等用户脚本管理器
          3. 访问Pixiv网站即可使用
        draft: false
        prerelease: false
        files: |
          dist/pixiv-novel-to-epub.user.js
          dist/pixiv-novel-to-epub.greasyfork.user.js
          dist/pixiv-novel-to-epub.min.user.js
          dist/pixiv-novel-to-epub.meta.js
